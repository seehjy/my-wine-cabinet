<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心-我的酒柜</title>
    <link rel="stylesheet" href="/css/global.css">
    <script src="/lib/tailwind.min.js"></script>
    <script src="/lib/lucide.min.js"></script>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="page-container">
<div class="status-bar-placeholder"></div>

<div id="main-content" style="min-height: calc(100vh - 44px - 80px); padding-bottom: 80px;">

  <!-- User Profile Header -->
  <div style="padding: 20px var(--spacing-lg) 0;">
    <div style="display: flex; align-items: center; gap: var(--spacing-lg);">
      <!-- Avatar -->
      <div id="profile-avatar" style="width: 64px; height: 64px; border-radius: var(--radius-full); border: 2.5px solid var(--color-primary); background: var(--color-background-muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden;">
        <i data-lucide="user" style="width: 32px; height: 32px; color: var(--color-primary);"></i>
      </div>
      <!-- Name & Info -->
      <div style="display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0;">
        <span id="user-name" style="font-size: var(--text-lg); font-weight: var(--font-medium); color: var(--color-text-primary); line-height: var(--leading-tight);">酒友小陈</span>
        <span id="user-email" style="font-size: var(--text-sm); color: var(--color-text-tertiary); line-height: var(--leading-normal);">chen@example.com</span>
      </div>
    </div>
  </div>

  <!-- Quick Stats Card -->
  <div id="quick-stats" style="margin: var(--spacing-xl) var(--spacing-lg) 0; background: var(--color-background-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--spacing-lg) 0; display: flex; align-items: center;">
  </div>

  <!-- Settings Groups -->
  <div style="margin-top: var(--spacing-xl); padding: 0 var(--spacing-lg);">

    <!-- 功能列表 Group -->
    <div style="background: var(--color-background-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: var(--spacing-xl);">
      <div style="padding: var(--spacing-sm) var(--spacing-lg); font-size: var(--text-xs); color: var(--color-text-tertiary); font-weight: var(--font-medium); letter-spacing: 0.05em;">功能</div>

      <!-- 统计分析 -->
      <a data-dom-id="row-stats" href="stats.html" style="display: flex; align-items: center; padding: 0 var(--spacing-lg); height: 48px; border-bottom: 1px solid var(--color-border-light); text-decoration: none; color: inherit; transition: background-color 150ms ease;">
        <div style="width: 36px; height: 36px; border-radius: var(--radius-md); background: var(--color-primary-lightest); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: var(--spacing-md);">
          <i data-lucide="bar-chart-3" style="width: 18px; height: 18px; color: var(--color-primary);"></i>
        </div>
        <span style="flex: 1; font-size: var(--text-base); color: var(--color-text-primary);">统计分析</span>
        <i data-lucide="chevron-right" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
      </a>

      <!-- 数据导出 -->
      <div data-dom-id="row-export" id="btn-export" style="display: flex; align-items: center; padding: 0 var(--spacing-lg); height: 48px; border-bottom: 1px solid var(--color-border-light); cursor: pointer; transition: background-color 150ms ease;">
        <div style="width: 36px; height: 36px; border-radius: var(--radius-md); background: var(--color-primary-lightest); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: var(--spacing-md);">
          <i data-lucide="download" style="width: 18px; height: 18px; color: var(--color-primary);"></i>
        </div>
        <span style="flex: 1; font-size: var(--text-base); color: var(--color-text-primary);">数据导出</span>
        <i data-lucide="chevron-right" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
      </div>

      <!-- 数据导入 -->
      <div data-dom-id="row-import" id="btn-import" style="display: flex; align-items: center; padding: 0 var(--spacing-lg); height: 48px; border-bottom: 1px solid var(--color-border-light); cursor: pointer; transition: background-color 150ms ease;">
        <div style="width: 36px; height: 36px; border-radius: var(--radius-md); background: var(--color-primary-lightest); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: var(--spacing-md);">
          <i data-lucide="upload" style="width: 18px; height: 18px; color: var(--color-primary);"></i>
        </div>
        <span style="flex: 1; font-size: var(--text-base); color: var(--color-text-primary);">数据导入</span>
        <i data-lucide="chevron-right" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
      </div>
      <input type="file" id="import-file" accept=".json" style="display: none;">

      <!-- 主题切换 -->
      <div data-dom-id="row-theme" id="btn-theme" style="display: flex; align-items: center; padding: 0 var(--spacing-lg); height: 48px; border-bottom: 1px solid var(--color-border-light); cursor: pointer; transition: background-color 150ms ease;">
        <div style="width: 36px; height: 36px; border-radius: var(--radius-md); background: var(--color-primary-lightest); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: var(--spacing-md);">
          <i data-lucide="moon" id="theme-icon" style="width: 18px; height: 18px; color: var(--color-primary);"></i>
        </div>
        <span style="flex: 1; font-size: var(--text-base); color: var(--color-text-primary);">主题切换</span>
        <span id="theme-label" style="font-size: var(--text-sm); color: var(--color-text-tertiary); margin-right: var(--spacing-xs);">浅色</span>
        <i data-lucide="chevron-right" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
      </div>

      <!-- 关于 -->
      <div data-dom-id="row-about" id="btn-about" style="display: flex; align-items: center; padding: 0 var(--spacing-lg); height: 48px; cursor: pointer; transition: background-color 150ms ease;">
        <div style="width: 36px; height: 36px; border-radius: var(--radius-md); background: var(--color-primary-lightest); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: var(--spacing-md);">
          <i data-lucide="info" style="width: 18px; height: 18px; color: var(--color-primary);"></i>
        </div>
        <span style="flex: 1; font-size: var(--text-base); color: var(--color-text-primary);">关于</span>
        <i data-lucide="chevron-right" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
      </div>
    </div>

    <!-- 账户 Group -->
    <div style="background: var(--color-background-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: var(--spacing-xl);">
      <div style="padding: var(--spacing-sm) var(--spacing-lg); font-size: var(--text-xs); color: var(--color-text-tertiary); font-weight: var(--font-medium); letter-spacing: 0.05em;">账户</div>

      <!-- 退出登录 -->
      <div data-dom-id="row-logout" id="btn-logout" style="display: flex; align-items: center; padding: 0 var(--spacing-lg); height: 48px; cursor: pointer; transition: background-color 150ms ease;">
        <div style="width: 36px; height: 36px; border-radius: var(--radius-md); background: rgba(166, 61, 47, 0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: var(--spacing-md);">
          <i data-lucide="log-out" style="width: 18px; height: 18px; color: var(--state-error);"></i>
        </div>
        <span style="flex: 1; font-size: var(--text-base); color: var(--state-error);">退出登录</span>
      </div>
    </div>

  </div>

  <!-- App Version Footer -->
  <div style="text-align: center; padding: var(--spacing-xl) var(--spacing-lg) var(--spacing-3xl); font-size: var(--text-xs); color: var(--color-text-tertiary);">
    我的酒柜 v1.0.0
  </div>

</div>

    </main>
    <script src="/js/datastore.js?v=20260705"></script>
    <script src="/js/app.js?v=20260705"></script>
    <script src="/js/ui.js?v=20260705"></script>
    <script src="/js/onboarding.js?v=20260705"></script>
    <script>
      (function() {
        var data = WineCabinetApp.getData();
        var user = data.user;

        function renderUserInfo() {
          var nameEl = document.getElementById('user-name');
          var emailEl = document.getElementById('user-email');
          var avatarEl = document.getElementById('profile-avatar');

          if (nameEl) nameEl.textContent = (data.user && data.user.name) || '酒友';
          if (emailEl) emailEl.textContent = user.email || '';

          if (user.avatar && avatarEl) {
            avatarEl.innerHTML = '<img src="' + user.avatar + '" alt="头像" style="width: 100%; height: 100%; object-fit: cover;">';
          }
        }

        function renderQuickStats() {
          var statsContainer = document.getElementById('quick-stats');
          var stats = WineCabinetApp.getStats();
          var tastingCount = data.tastingNotes ? data.tastingNotes.length : 0;
          var wishlistCount = data.wishlist ? data.wishlist.length : 0;

          var statItems = [
            { label: '在库数', value: stats.totalCount, unit: '瓶', color: 'var(--color-text-primary)' },
            { label: '已品鉴', value: tastingCount, unit: '次', color: 'var(--color-primary)' },
            { label: '心愿单', value: wishlistCount, unit: '个', color: 'var(--color-text-primary)' }
          ];

          statsContainer.innerHTML = statItems.map(function(item, index) {
            var isLast = index === statItems.length - 1;
            var borderStyle = isLast ? '' : 'border-right: 1px solid var(--color-border);';
            return '<div style="flex: 1; text-align: center; ' + borderStyle + '">' +
              '<div style="font-size: var(--text-2xl); font-weight: var(--font-semibold); color: ' + item.color + '; font-variant-numeric: tabular-nums; line-height: var(--leading-tight);">' + item.value + '</div>' +
              '<div style="font-size: var(--text-xs); color: var(--color-text-secondary); margin-top: var(--spacing-xs);">' + item.label + '(' + item.unit + ')</div>' +
            '</div>';
          }).join('');
        }

        function updateThemeLabel() {
          var html = document.documentElement;
          var isDark = html.classList.contains('dark');
          var labelEl = document.getElementById('theme-label');
          var iconEl = document.getElementById('theme-icon');
          if (labelEl) {
            labelEl.textContent = isDark ? '深色' : '浅色';
          }
          if (iconEl) {
            iconEl.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
          }
        }

        function exportData() {
          var jsonStr = WineCabinetApp.exportData();
          var blob = new Blob([jsonStr], { type: 'application/json' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = 'wine-cabinet-backup-' + new Date().toISOString().split('T')[0] + '.json';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          WineCabinetApp.showToast('数据导出成功', 'success');
        }

        function importData(file) {
          var reader = new FileReader();
          reader.onload = function(e) {
            try {
              var jsonStr = e.target.result;
              var result = WineCabinetApp.importData(jsonStr);
              WineCabinetApp.showToast(result.message, result.success ? 'success' : 'error');
              if (result.success) {
                setTimeout(function() {
                  location.reload();
                }, 1000);
              }
            } catch (err) {
              WineCabinetApp.showToast('文件解析失败', 'error');
            }
          };
          reader.readAsText(file);
        }

        function bindEvents() {
          var themeBtn = document.getElementById('btn-theme');
          if (themeBtn) {
            themeBtn.addEventListener('click', function() {
              WineCabinetApp.toggleTheme();
              updateThemeLabel();
              if (window.lucide) {
                lucide.createIcons();
              }
            });
          }

          var exportBtn = document.getElementById('btn-export');
          if (exportBtn) {
            exportBtn.addEventListener('click', exportData);
          }

          var importBtn = document.getElementById('btn-import');
          var importFile = document.getElementById('import-file');
          if (importBtn && importFile) {
            importBtn.addEventListener('click', function() {
              importFile.click();
            });
            importFile.addEventListener('change', function(e) {
              if (e.target.files && e.target.files[0]) {
                importData(e.target.files[0]);
              }
            });
          }

          var aboutBtn = document.getElementById('btn-about');
          if (aboutBtn) {
            aboutBtn.addEventListener('click', function() {
              WineCabinetApp.showToast('我的酒柜 v1.0.0', 'info');
            });
          }

          var logoutBtn = document.getElementById('btn-logout');
          if (logoutBtn) {
            logoutBtn.addEventListener('click', async function() {
              var confirmed = await WineCabinetApp.showConfirm({
                title: '退出登录',
                message: '确定要退出登录吗？您的数据仍然保存在本地',
                type: 'info',
                confirmText: '确定退出',
                cancelText: '取消'
              });
              if (confirmed) {
                if (typeof WineCabinetApp.logout === 'function') {
                  WineCabinetApp.logout();
                } else {
                  localStorage.removeItem('wine_cabinet_data');
                }
                WineCabinetApp.showToast('已退出登录', 'info');
                setTimeout(function() {
                  location.href = 'home.html';
                }, 800);
              }
            });
          }

        }

        function init() {
          renderUserInfo();
          renderQuickStats();
          updateThemeLabel();
          bindEvents();
          if (window.lucide) {
            lucide.createIcons();
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }
      })();
    </script>
</body>
</html>
