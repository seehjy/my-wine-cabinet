<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品鉴笔记-我的酒柜</title>
    <link rel="stylesheet" href="../css/global.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="page-container">
<div class="status-bar-placeholder"></div>

<div id="main-content" style="min-height: calc(100vh - 44px - 80px); padding-bottom: 80px;">

  <div style="padding: 0 var(--spacing-lg);">

    <div style="display: flex; align-items: center; justify-content: space-between; padding: var(--spacing-sm) 0 var(--spacing-md);">
      <div style="display: flex; align-items: baseline; gap: var(--spacing-sm);">
        <h1 style="font-family: var(--font-display); font-size: var(--text-2xl); font-weight: var(--font-semibold); color: var(--color-text-primary); line-height: var(--leading-tight); letter-spacing: -0.01em; margin: 0; text-wrap: balance; word-break: keep-all;">品鉴笔记</h1>
        <span id="notes-count" style="font-size: var(--text-sm); color: var(--color-text-tertiary); font-weight: var(--font-normal);">0条记录</span>
      </div>
      <a href="tasting-form.html" class="icon-btn" aria-label="记品鉴" style="text-decoration: none;">
        <i data-lucide="plus" style="width: 20px; height: 20px;"></i>
      </a>
    </div>

    <div id="tasting-notes-list" style="display: flex; flex-direction: column; gap: var(--spacing-md); padding-bottom: var(--spacing-xl);">
    </div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <div class="empty-state-icon">
        <i data-lucide="wine" style="width: 64px; height: 64px;"></i>
      </div>
      <h3 class="empty-state-title">还没有品鉴笔记</h3>
      <p class="empty-state-desc">记录每一次品鉴，珍藏独特风味</p>
      <a href="tasting-form.html" class="btn btn-primary" style="margin-top: var(--spacing-lg); text-decoration: none;">
        <i data-lucide="pen-tool" style="width: 18px; height: 18px;"></i>
        记录第一次品鉴
      </a>
    </div>

  </div>
</div>

    </main>
    <script src="../js/datastore.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/onboarding.js?v=20260702f"></script>
    <script>
      (function() {
        function getScoreBadgeClass(score) {
          if (score == null) return 'badge-warning';
          if (score >= 9.0) return 'badge-primary';
          if (score >= 8.0) return 'badge-success';
          if (score >= 7.0) return 'badge-warning';
          return 'badge-error';
        }

        function getScoreLabel(score) {
          if (score == null) return '未评分';
          if (score >= 9.0) return '优秀';
          if (score >= 8.0) return '良好';
          if (score >= 7.0) return '一般';
          return '待提升';
        }

        function getOccasionBadgeStyle(occasion) {
          var map = {
            '自饮': 'var(--state-info)',
            '独酌': 'var(--state-info)',
            '聚会': 'var(--state-success)',
            '宴请': 'var(--color-primary)',
            '送礼': 'var(--state-warning)',
            '商务': 'var(--color-primary-dark)',
            '节日': 'var(--state-error)'
          };
          return map[occasion] || 'var(--color-text-tertiary)';
        }

        function renderDimensions(dimensions) {
          if (!dimensions) return '';
          var items = [
            { label: '色', key: 'color' },
            { label: '香', key: 'aroma' },
            { label: '味', key: 'taste' },
            { label: '格', key: 'overall' }
          ];
          return items.map(function(item) {
            var val = dimensions[item.key];
            if (val === undefined || val === null) return '';
            var pct = Math.min(100, Math.max(0, (val / 10) * 100));
            return '<div style="display: flex; align-items: center; gap: var(--spacing-xs); min-width: 0; flex: 1;">' +
              '<span style="font-size: var(--text-xs); color: var(--color-text-tertiary); flex-shrink: 0; width: 14px; text-align: center;">' + item.label + '</span>' +
              '<div style="flex: 1; height: 4px; background: var(--color-background-sunken); border-radius: var(--radius-full); overflow: hidden;">' +
                '<div style="height: 100%; width: ' + pct + '%; background: var(--color-primary); border-radius: var(--radius-full); transition: width 300ms ease;"></div>' +
              '</div>' +
              '<span style="font-size: var(--text-xs); color: var(--color-text-secondary); font-variant-numeric: tabular-nums; flex-shrink: 0; width: 22px; text-align: right;">' + val + '</span>' +
            '</div>';
          }).join('');
        }

        function renderNotes() {
          var data = WineCabinetApp.getData() || {};
          var notes = (data.tastingNotes || []).slice().sort(function(a, b) {
            return new Date(b.date) - new Date(a.date);
          });

          var countEl = document.getElementById('notes-count');
          var listEl = document.getElementById('tasting-notes-list');
          var emptyEl = document.getElementById('empty-state');

          countEl.textContent = notes.length + '条记录';

          if (notes.length === 0) {
            listEl.style.display = 'none';
            emptyEl.style.display = 'flex';
            return;
          }

          listEl.style.display = 'flex';
          emptyEl.style.display = 'none';

          listEl.innerHTML = notes.map(function(note) {
            var badgeClass = getScoreBadgeClass(note.score);
            var scoreLabel = getScoreLabel(note.score);
            var occasionColor = getOccasionBadgeStyle(note.occasion);

            var sensoryHtml = '';
            var sensoryItems = [];
            if (note.appearance) sensoryItems.push({ label: '色泽', text: note.appearance });
            if (note.aroma) sensoryItems.push({ label: '香气', text: note.aroma });
            if (note.taste) sensoryItems.push({ label: '口感', text: note.taste });
            if (sensoryItems.length > 0) {
              sensoryHtml = '<div style="display: flex; flex-direction: column; gap: var(--spacing-xs); margin-bottom: var(--spacing-md);">' +
                sensoryItems.map(function(item) {
                  return '<div style="font-size: var(--text-sm); color: var(--color-text-secondary); line-height: var(--leading-relaxed);">' +
                    '<span style="color: var(--color-text-tertiary); font-weight: var(--font-medium); margin-right: var(--spacing-xs);">' + item.label + '：</span>' +
                    escapeHtml(item.text) +
                  '</div>';
                }).join('') +
              '</div>';
            }

            var cardContent = '<div style="display: flex; align-items: flex-start; justify-content: space-between; gap: var(--spacing-sm); margin-bottom: var(--spacing-md);">' +
                '<div style="flex: 1; min-width: 0;">' +
                  '<h3 style="font-size: var(--text-lg); font-weight: var(--font-semibold); color: var(--color-text-primary); margin: 0 0 var(--spacing-xs); line-height: 1.4; word-break: break-all;">' + escapeHtml(note.wine) + '</h3>' +
                  '<p style="font-size: var(--text-sm); color: var(--color-text-secondary); margin: 0;">' + escapeHtml(note.brand) + '</p>' +
                '</div>' +
                '<div style="display: flex; flex-direction: column; align-items: flex-end; gap: var(--spacing-xs); flex-shrink: 0;">' +
                  '<span class="badge badge-pill ' + badgeClass + '" style="font-size: var(--text-sm); height: 24px; padding: 0 10px; font-weight: var(--font-bold); font-variant-numeric: tabular-nums;">' + (note.score != null ? note.score.toFixed(1) : '-') + '</span>' +
                  '<span style="font-size: var(--text-xs); color: var(--color-text-tertiary);">' + scoreLabel + '</span>' +
                '</div>' +
              '</div>' +
              '<div style="display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-md); flex-wrap: wrap;">' +
                renderDimensions(note.dimensions) +
              '</div>' +
              sensoryHtml +
              (note.notes ? '<p style="font-size: var(--text-sm); color: var(--color-text-secondary); line-height: var(--leading-relaxed); margin: 0 0 var(--spacing-md); padding: var(--spacing-sm) var(--spacing-md); background: var(--color-background-muted); border-radius: var(--radius-md); border-left: 3px solid var(--color-primary-lighter);">' + escapeHtml(note.notes) + '</p>' : '') +
              '<div style="display: flex; align-items: center; justify-content: space-between; padding-top: var(--spacing-sm); border-top: 1px solid var(--color-border-light);">' +
                '<div style="display: flex; align-items: center; gap: var(--spacing-xs); color: var(--color-text-tertiary); font-size: var(--text-xs);">' +
                  '<i data-lucide="calendar" style="width: 14px; height: 14px;"></i>' +
                  '<span>' + note.date + '</span>' +
                '</div>' +
                (note.occasion ? '<span style="display: inline-flex; align-items: center; gap: var(--spacing-xs); font-size: var(--text-xs); color: ' + occasionColor + '; background: ' + occasionColor + '1a; padding: 2px var(--spacing-sm); border-radius: var(--radius-full); font-weight: var(--font-medium);">' +
                  '<i data-lucide="map-pin" style="width: 12px; height: 12px;"></i>' + escapeHtml(note.occasion) +
                '</span>' : '') +
              '</div>';

            if (note.wineId) {
              return '<a href="detail.html?id=' + encodeURIComponent(note.wineId) + '" style="text-decoration: none; color: inherit; display: block;">' +
                '<div class="card" style="padding: var(--spacing-lg); transition: transform 120ms cubic-bezier(.2,.8,.2,1), box-shadow 160ms cubic-bezier(.2,.8,.2,1); cursor: pointer;">' +
                  cardContent +
                '</div>' +
              '</a>';
            }
            return '<div class="card" style="padding: var(--spacing-lg); transition: transform 120ms cubic-bezier(.2,.8,.2,1), box-shadow 160ms cubic-bezier(.2,.8,.2,1);">' +
              cardContent +
            '</div>';
          }).join('');

          if (window.lucide) {
            lucide.createIcons();
          }
        }

        function escapeHtml(str) {
          if (!str) return '';
          var div = document.createElement('div');
          div.appendChild(document.createTextNode(str));
          return div.innerHTML;
        }

        function init() {
          renderNotes();
          if (window.lucide) {
            lucide.createIcons();
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }
      })();
    </script>
</body>
</html>
