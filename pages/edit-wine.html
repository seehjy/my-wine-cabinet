<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑规格-我的酒柜</title>
  <link rel="stylesheet" href="/css/global.css">
  <script src="/lib/tailwind.min.js"></script>
  <script src="/lib/lucide.min.js"></script>
  <style>
    .form-input, .form-select, .form-textarea { 
      transition: all 0.25s ease;
      font-size: 16px;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(139,105,20,0.1);
    }
    .field-hint {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 4px;
    }
    .cascade-level { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0; }
    .cascade-btn { padding: 8px 16px; border: 2px solid var(--color-border-light); border-radius: var(--radius-full); background: var(--color-background-elevated); font-size: var(--text-sm); color: var(--color-text-primary); cursor: pointer; transition: all 0.2s; }
    .cascade-btn:active, .cascade-btn.selected { border-color: var(--color-primary); background: rgba(139,105,20,0.06); color: var(--color-primary); font-weight: 600; }
    #cascade-result { padding: 10px 14px; background: rgba(139,105,20,0.04); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: space-between; font-size: var(--text-sm); }
  </style>
</head>
<body>
  <main class="page-container">
    <div class="status-bar-placeholder"></div>

    <div id="main-content" style="padding: 0 16px 100px;">
      <form id="edit-wine-form" style="padding-top: 8px;">

        <div class="card" style="margin-bottom: 12px;">
          <div style="padding: 12px 16px; background: rgba(139,105,20,0.04); border-radius: var(--radius-md); margin-bottom: 12px;">
            <div style="font-size: var(--text-base); font-weight: var(--font-semibold); color: var(--color-text-primary);">{{brand}} {{name}}</div>
            <div style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: 2px;">{{degree}}° · {{capacity}}mL · {{type}}</div>
          </div>
        </div>

        <div class="card" style="margin-bottom: 12px;">
          <h2 style="font-size: var(--text-lg); margin-bottom: 8px;">规格信息</h2>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="price">价格 (元)</label>
              <input type="number" id="price" name="price" class="form-input" placeholder="0">
            </div>
            <div class="form-group">
              <label class="form-label" for="capacity">容量 (mL)</label>
              <input type="number" id="capacity" name="capacity" class="form-input" placeholder="500">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="quantity">数量</label>
              <input type="number" id="quantity" name="quantity" class="form-input" value="1" min="0">
            </div>
            <div class="form-group">
              <label class="form-label" for="status">状态</label>
              <select id="status" name="status" class="form-select">
                <option value="cellared">在藏</option>
                <option value="opened">已开瓶</option>
                <option value="finished">已饮完</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="spec">包装/版本</label>
            <input type="text" id="spec" name="spec" class="form-input" placeholder="如：礼盒装、小酒版">
          </div>
        </div>

        <div class="card" style="margin-bottom: 12px;">
          <h2 style="font-size: var(--text-lg); margin-bottom: 8px;">酒类分类</h2>
          <div class="form-group">
            <div id="cascade-selector">
              <div id="cascade-level1" class="cascade-level"></div>
              <div id="cascade-level2" class="cascade-level" style="display:none;"></div>
              <div id="cascade-level3" class="cascade-level" style="display:none;"></div>
              <div id="cascade-result" style="display:none;"></div>
            </div>
            <input type="hidden" id="category" name="category">
            <input type="hidden" id="subCategory" name="subCategory">
            <input type="hidden" id="detailType" name="detailType">
          </div>
        </div>

        <div class="card" style="margin-bottom: 12px;">
          <h2 style="font-size: var(--text-lg); margin-bottom: 8px;">购买与存放</h2>

          <div class="form-group">
            <label class="form-label" for="location">存放位置</label>
            <input type="text" id="location" name="location" class="form-input" placeholder="如：酒柜第一层">
          </div>

          <div class="form-group">
            <label class="form-label" for="purchaseDate">购入日期</label>
            <input type="date" id="purchaseDate" name="purchaseDate" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label" for="purchaseChannel">购入渠道</label>
            <input type="text" id="purchaseChannel" name="purchaseChannel" class="form-input" placeholder="如：京东、专卖店">
          </div>

          <div class="form-group">
            <label class="form-label" for="agingYears">陈酿年数</label>
            <input type="number" id="agingYears" name="agingYears" class="form-input" placeholder="如：12（酒标没标就留空）" min="1" max="100">
          </div>

          <div class="form-group">
            <label class="form-label" for="productionYear">生产年份</label>
            <input type="number" id="productionYear" name="productionYear" class="form-input" placeholder="如：2020（4位数年份）" min="1900" max="2100">
          </div>

          <div class="form-group" id="expiry-group" style="display:none;">
            <label class="form-label" for="expiryDate">
              <i data-lucide="clock" style="width:14px;height:14px;display:inline;vertical-align:-2px;margin-right:2px;color:var(--state-warning);"></i>
              保质期至
            </label>
            <input type="date" id="expiryDate" name="expiryDate" class="form-input">
          </div>
        </div>

        <div class="card" style="margin-bottom: 12px;">
          <h2 style="font-size: var(--text-lg); margin-bottom: 8px;">备注</h2>
          <textarea id="notes" name="notes" class="form-textarea" rows="3" placeholder="记录品鉴心得、注意事项等"></textarea>
          <div style="margin-top: 10px;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
              <span style="font-size: var(--text-xs); color: var(--color-text-tertiary);">备注图片</span>
              <button type="button" id="btn-add-note-image" style="display: flex; align-items: center; gap: 4px; padding: 6px 12px; border: 1px dashed var(--color-border); background: transparent; border-radius: var(--radius-md); font-size: var(--text-xs); color: var(--color-text-secondary); cursor: pointer;">
                <i data-lucide="image-plus" style="width: 14px; height: 14px;"></i>
                <span>添加图片</span>
              </button>
              <input type="file" id="note-image-input" accept="image/*" multiple style="display: none;">
            </div>
            <div id="note-images-preview" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
          </div>
        </div>

        <div class="card" style="margin-bottom: 12px; border-color: var(--state-error);">
          <button type="button" id="btn-delete" class="btn btn-block" style="color: var(--state-error); border: 1px solid var(--state-error); background: transparent;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:middle;margin-right:4px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            删除此规格
          </button>
        </div>
      </form>
    </div>
  </main>

  <div style="position: fixed; bottom: 0; left: 0; right: 0; background: var(--color-background-elevated); border-top: 1px solid var(--color-border); padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); z-index: 100;">
    <button type="button" id="btn-save" class="btn btn-primary btn-block" style="padding: 14px; font-size: 16px; font-weight: 600; box-shadow: 0 4px 16px rgba(139,105,20,0.35);">
      保存修改
    </button>
  </div>

  <script src="/js/datastore.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/onboarding.js?v=20260702f"></script>
  <script src="/js/wine-db.js?v=20260702f"></script>
  <script>
    (function() {
      var wineId = null;
      var wineData = null;
      var noteImages = [];

      function getQueryParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      function init() {
        wineId = getQueryParam('id');
        if (!wineId) {
          WineCabinetApp.showToast('参数错误', 'error');
          setTimeout(function() { window.location.href = 'collection.html'; }, 800);
          return;
        }

        wineData = WineCabinetApp.getWineById(wineId);
        if (!wineData) {
          WineCabinetApp.showToast('酒品不存在', 'error');
          setTimeout(function() { window.location.href = 'collection.html'; }, 800);
          return;
        }

        WineCabinetUI.renderHeader({
          title: '编辑规格',
          showBack: true,
          backUrl: 'detail.html?id=' + wineId
        });

        var bottomNav = document.querySelector('.bottom-nav');
        if (bottomNav) bottomNav.remove();

        fillForm();
        initCascadeSelector();
        initExpiryField();

        // 如果酒已有分类，初始化后再设置一次
        if (wineData.type) {
          setCascadeFromType(wineData.type);
        } else if (wineData.category) {
          showCascadeResultDirect(wineData.category, wineData.subCategory || '', wineData.detailType || '');
        }

        document.getElementById('btn-save').addEventListener('click', handleSave);
        document.getElementById('btn-delete').addEventListener('click', handleDelete);

        var addNoteImgBtn = document.getElementById('btn-add-note-image');
        var noteImgInput = document.getElementById('note-image-input');
        if (addNoteImgBtn && noteImgInput) {
          addNoteImgBtn.addEventListener('click', function() { noteImgInput.click(); });
          noteImgInput.addEventListener('change', function(e) {
            var files = e.target.files;
            if (!files || files.length === 0) return;
            for (var i = 0; i < files.length; i++) {
              (function(file) {
                var reader = new FileReader();
                reader.onload = function(ev) {
                  var img = new Image();
                  img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var maxSize = 1200;
                    var w = img.width, h = img.height;
                    if (w > maxSize || h > maxSize) {
                      if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                      else { w = Math.round(w * maxSize / h); h = maxSize; }
                    }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    noteImages.push(canvas.toDataURL('image/jpeg', 0.85));
                    renderNoteImages();
                  };
                  img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
              })(files[i]);
            }
            noteImgInput.value = '';
          });
        }

        if (window.lucide) lucide.createIcons();
      }

      function initExpiryField() {
        var degreeInput = document.getElementById('degree');
        var expiryGroup = document.getElementById('expiry-group');

        function checkNeedExpiry() {
          var degree = parseFloat(wineData.degree);
          var categoryVal = document.getElementById('category').value;
          var isLowAlcohol = (degree && degree <= 20) || categoryVal === '啤酒' || categoryVal === '葡萄酒' || categoryVal === '其他';
          expiryGroup.style.display = isLowAlcohol ? 'block' : 'none';
          if (window.lucide) lucide.createIcons();
        }

        checkNeedExpiry();
      }

      function initCascadeSelector() {
        var categories = WineDB.getWineCategories();
        var level1 = document.getElementById('cascade-level1');
        var level2 = document.getElementById('cascade-level2');
        var level3 = document.getElementById('cascade-level3');
        var result = document.getElementById('cascade-result');
        var inputCategory = document.getElementById('category');
        var inputSub = document.getElementById('subCategory');
        var inputDetail = document.getElementById('detailType');

        // 生成第一步按钮
        var html1 = '';
        Object.keys(categories).forEach(function(cat) {
          html1 += '<button type="button" class="cascade-btn" data-value="' + cat + '">' + cat + '</button>';
        });
        level1.innerHTML = html1;

        // 白酒香型短名到WINE_CATEGORIES全名的映射
        var baijiuTypeMap = { '酱香': '酱香型', '浓香': '浓香型', '清香': '清香型', '兼香': '兼香型' };

        // 点击大类
        level1.addEventListener('click', function(e) {
          var btn = e.target.closest('.cascade-btn');
          if (!btn) return;
          level1.querySelectorAll('.cascade-btn').forEach(function(b) { b.classList.remove('selected'); });
          btn.classList.add('selected');
          var cat = btn.getAttribute('data-value');
          inputCategory.value = cat;
          inputSub.value = '';
          inputDetail.value = '';

          var subs = categories[cat];
          if (subs) {
            var html2 = '';
            Object.keys(subs).forEach(function(sub) {
              html2 += '<button type="button" class="cascade-btn" data-value="' + sub + '">' + sub + '</button>';
            });
            level2.innerHTML = html2;
            level2.style.display = 'flex';
          } else {
            level2.style.display = 'none';
          }
          level3.style.display = 'none';
          result.style.display = 'none';
        });

        // 点击子类
        level2.addEventListener('click', function(e) {
          var btn = e.target.closest('.cascade-btn');
          if (!btn) return;
          level2.querySelectorAll('.cascade-btn').forEach(function(b) { b.classList.remove('selected'); });
          btn.classList.add('selected');
          var sub = btn.getAttribute('data-value');
          inputSub.value = sub;
          inputDetail.value = '';

          var cat = inputCategory.value;
          var subData = categories[cat] ? categories[cat][sub] : null;
          if (subData && !isLeafNode(subData)) {
            var html3 = '';
            Object.keys(subData).forEach(function(detail) {
              html3 += '<button type="button" class="cascade-btn" data-value="' + detail + '">' + detail + '</button>';
            });
            level3.innerHTML = html3;
            level3.style.display = 'flex';
            result.style.display = 'none';
          } else {
            level3.style.display = 'none';
            showCascadeResult();
          }
        });

        // 点击具体类型
        level3.addEventListener('click', function(e) {
          var btn = e.target.closest('.cascade-btn');
          if (!btn) return;
          level3.querySelectorAll('.cascade-btn').forEach(function(b) { b.classList.remove('selected'); });
          btn.classList.add('selected');
          inputDetail.value = btn.getAttribute('data-value');
          showCascadeResult();
        });

        function isLeafNode(obj) {
          return !obj || typeof obj !== 'object' || Object.keys(obj).length === 0;
        }

        function showCascadeResult() {
          var parts = [];
          if (inputCategory.value) parts.push(inputCategory.value);
          if (inputSub.value) parts.push(inputSub.value);
          if (inputDetail.value) parts.push(inputDetail.value);
          result.innerHTML = '<span style="color: var(--color-primary); font-weight: 600;">' + parts.join(' › ') + '</span>' +
            '<button type="button" onclick="resetCascade()" style="background:none;border:none;color:var(--color-text-tertiary);cursor:pointer;font-size:var(--text-sm);">修改</button>';
          result.style.display = 'flex';
          level1.style.display = 'none';
          level2.style.display = 'none';
          level3.style.display = 'none';
          // 检查保质期字段
          initExpiryField();
        }
      }

      function isLeafNodeReverse(obj) {
        return !obj || typeof obj !== 'object' || Object.keys(obj).length === 0;
      }

      function showCascadeResultDirect(cat, sub, detail) {
        var result = document.getElementById('cascade-result');
        var level1 = document.getElementById('cascade-level1');
        var level2 = document.getElementById('cascade-level2');
        var level3 = document.getElementById('cascade-level3');
        var inputCategory = document.getElementById('category');
        var inputSub = document.getElementById('subCategory');
        var inputDetail = document.getElementById('detailType');
        if (cat) inputCategory.value = cat;
        if (sub) inputSub.value = sub;
        if (detail) inputDetail.value = detail;
        var parts = [];
        if (cat) parts.push(cat);
        if (sub) parts.push(sub);
        if (detail) parts.push(detail);
        result.innerHTML = '<span style="color: var(--color-primary); font-weight: 600;">' + parts.join(' › ') + '</span>' +
          '<button type="button" onclick="resetCascade()" style="background:none;border:none;color:var(--color-text-tertiary);cursor:pointer;font-size:var(--text-sm);">修改</button>';
        result.style.display = 'flex';
        level1.style.display = 'none';
        level2.style.display = 'none';
        level3.style.display = 'none';
        initExpiryField();
      }

      function reverseMatchCascade(typeStr) {
        if (!typeStr) return;
        var categories = WineDB.getWineCategories();
        var inputCategory = document.getElementById('category');
        var inputSub = document.getElementById('subCategory');
        var inputDetail = document.getElementById('detailType');
        var typeToSubMap = { '酱香': '酱香型', '浓香': '浓香型', '清香': '清香型', '兼香': '兼香型', '其他': '其他' };
        var found = false;

        // 先检查是否直接匹配大类
        if (categories[typeStr]) {
          inputCategory.value = typeStr;
          inputSub.value = '';
          inputDetail.value = '';
          showCascadeResultDirect(typeStr, '', '');
          return;
        }

        // 搜索WINE_CATEGORIES找到匹配
        Object.keys(categories).forEach(function(cat) {
          if (found) return;
          var subs = categories[cat];
          if (!subs) return;
          Object.keys(subs).forEach(function(sub) {
            if (found) return;
            var subData = subs[sub];
            if (subData && !isLeafNodeReverse(subData)) {
              Object.keys(subData).forEach(function(detail) {
                if (found) return;
                if (detail === typeStr) {
                  inputCategory.value = cat;
                  inputSub.value = sub;
                  inputDetail.value = detail;
                  showCascadeResultDirect(cat, sub, detail);
                  found = true;
                }
              });
            }
            if (!found && (sub === typeStr || sub === (typeToSubMap[typeStr] || ''))) {
              inputCategory.value = cat;
              inputSub.value = sub;
              inputDetail.value = '';
              showCascadeResultDirect(cat, sub, '');
              found = true;
            }
          });
        });
      }

      function setCascadeFromType(typeStr) {
        resetCascade();
        reverseMatchCascade(typeStr);
      }

      function resetCascade() {
        var level1 = document.getElementById('cascade-level1');
        var level2 = document.getElementById('cascade-level2');
        var level3 = document.getElementById('cascade-level3');
        var result = document.getElementById('cascade-result');
        level1.style.display = 'flex';
        level2.style.display = 'none';
        level3.style.display = 'none';
        result.style.display = 'none';
        document.getElementById('category').value = '';
        document.getElementById('subCategory').value = '';
        document.getElementById('detailType').value = '';
        level1.querySelectorAll('.cascade-btn').forEach(function(b) { b.classList.remove('selected'); });
      }

      // 暴露给内联onclick使用
      window.resetCascade = resetCascade;

      function fillForm() {
        var form = document.getElementById('edit-wine-form');
        
        var header = form.querySelector('.card');
        header.innerHTML = header.innerHTML
          .replace('{{brand}}', wineData.brand || '未知品牌')
          .replace('{{name}}', wineData.name || '')
          .replace('{{degree}}', wineData.degree || '—')
          .replace('{{capacity}}', wineData.capacity || '—')
          .replace('{{type}}', wineData.type || '');

        form.price.value = wineData.price || '';
        form.capacity.value = wineData.capacity || '';
        form.quantity.value = wineData.quantity || 1;
        form.status.value = wineData.status || 'cellared';
        form.spec.value = wineData.spec || '';
        form.location.value = wineData.location || '';
        form.purchaseDate.value = wineData.purchaseDate || '';
        form.purchaseChannel.value = wineData.purchaseChannel || '';
        document.getElementById('expiryDate').value = wineData.expiryDate || '';
        form.notes.value = wineData.notes || '';
        noteImages = wineData.noteImages ? wineData.noteImages.slice() : [];
        renderNoteImages();

        if (wineData.agingYears) document.getElementById('agingYears').value = wineData.agingYears;
        if (wineData.productionYear) document.getElementById('productionYear').value = wineData.productionYear;
        else if (wineData.year) document.getElementById('productionYear').value = wineData.year;
      }

      function renderNoteImages() {
        var container = document.getElementById('note-images-preview');
        if (!container) return;
        if (!noteImages || noteImages.length === 0) {
          container.innerHTML = '';
          return;
        }
        var html = '';
        noteImages.forEach(function(img, idx) {
          html += '<div style="position: relative; width: 72px; height: 72px; border-radius: var(--radius-md); overflow: hidden; flex-shrink: 0;">' +
            '<img src="' + img + '" style="width: 100%; height: 100%; object-fit: cover;" alt="备注图片' + (idx + 1) + '">' +
            '<button type="button" data-idx="' + idx + '" class="note-img-del" style="position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.6); border: none; color: #fff; font-size: 14px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;">×</button>' +
          '</div>';
        });
        container.innerHTML = html;

        container.querySelectorAll('.note-img-del').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            noteImages.splice(parseInt(btn.getAttribute('data-idx')), 1);
            renderNoteImages();
          });
        });
      }

      function handleSave() {
        var form = document.getElementById('edit-wine-form');

        var categoryVal = form.category.value;
        var subCatVal = form.subCategory.value;
        var detailVal = form.detailType.value;
        var typeVal = detailVal || subCatVal || categoryVal || wineData.type || '';

        var updateData = {
          price: form.price.value ? parseFloat(form.price.value) : 0,
          capacity: form.capacity.value ? parseInt(form.capacity.value) : null,
          quantity: form.quantity.value ? parseInt(form.quantity.value) : 1,
          status: form.status.value || 'cellared',
          spec: form.spec.value.trim(),
          location: form.location.value.trim(),
          purchaseDate: form.purchaseDate.value,
          purchaseChannel: form.purchaseChannel.value.trim(),
          expiryDate: (wineData.degree && wineData.degree <= 20) ? form.expiryDate.value : null,
          notes: form.notes.value.trim(),
          noteImages: noteImages.length > 0 ? noteImages : null,
          type: typeVal,
          category: categoryVal || wineData.category || '',
          subCategory: subCatVal || wineData.subCategory || '',
          detailType: detailVal || wineData.detailType || '',
          agingYears: form.agingYears.value ? parseInt(form.agingYears.value) : null,
          productionYear: form.productionYear.value ? parseInt(form.productionYear.value) : null,
          year: form.productionYear.value ? parseInt(form.productionYear.value) : (form.agingYears.value ? parseInt(form.agingYears.value) : null)
        };

        var btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.style.opacity = '0.7';

        setTimeout(function() {
          WineCabinetApp.updateWine(wineId, updateData);
          WineCabinetApp.showToast('保存成功', 'success');
          setTimeout(function() { window.location.href = 'detail.html?id=' + wineId; }, 600);
        }, 200);
      }

      async function handleDelete() {
        var confirmed = await WineCabinetApp.showConfirm({
          title: '删除规格',
          message: '确定要删除这个规格吗？',
          type: 'danger',
          confirmText: '删除',
          cancelText: '取消'
        });
        if (!confirmed) return;
        WineCabinetApp.deleteWine(wineId);
        WineCabinetApp.showToast('已删除', 'success');
        setTimeout(function() { window.location.href = 'collection.html'; }, 800);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
