<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酒柜-我的酒柜</title>
  <link rel="stylesheet" href="/my-wine-cabinet/css/global.css">
  <script src="/my-wine-cabinet/lib/tailwind.min.js"></script>
  <script src="/my-wine-cabinet/lib/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="page-container">
    <div class="status-bar-placeholder"></div>

    <div id="main-content" style="padding: 0 16px 24px;">
      <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0 16px;">
        <div style="display: flex; align-items: center; gap: 10px;">
          <h1 class="page-title" style="font-size: var(--text-3xl);">我的酒柜</h1>
          <span id="wine-count-badge" class="badge badge-pill badge-primary" style="font-size: var(--text-sm); height: 24px; padding: 0 10px;">0</span>
        </div>
        <a href="/my-wine-cabinet/pages/add-wine.html" class="icon-btn" aria-label="添加酒品">
          <i data-lucide="plus" style="width: 20px; height: 20px;"></i>
        </a>
      </div>

      <div style="margin-bottom: 14px;">
        <div class="search-bar">
          <i data-lucide="search" style="width: 18px; height: 18px; color: var(--color-text-tertiary); flex-shrink: 0;"></i>
          <input id="search-input" type="text" placeholder="搜索酒品名称、品牌、编号...">
        </div>
      </div>

      <div style="margin-bottom: 12px;">
        <div id="brand-filters" class="no-scrollbar" style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;">
        </div>
      </div>

      <div style="margin-bottom: 16px;">
        <div id="type-filters" class="no-scrollbar" style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;">
        </div>
      </div>

      <div id="sort-buttons" style="display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;">
        <button class="filter-chip small active" data-sort="date">入库时间</button>
        <button class="filter-chip small" data-sort="price">价格</button>
        <button class="filter-chip small" data-sort="degree">度数</button>
        <button class="filter-chip small" data-sort="name">名称</button>
      </div>

      <div id="wine-list" style="display: flex; flex-direction: column; gap: 10px;">
      </div>

      <div id="finished-section" style="margin-top: 32px; display: none;">
        <h2 id="finished-toggle" class="section-title" style="display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;">
          <svg id="finished-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px; transition: transform 0.2s; flex-shrink: 0;"><polyline points="9 18 15 12 9 6"/></svg>
          已饮
          <span id="finished-count-badge" class="badge badge-pill" style="background: var(--color-background-sunken); color: var(--color-text-tertiary);">0</span>
        </h2>
        <div id="finished-list" style="display: none; flex-direction: column; gap: 10px; margin-top: 10px;">
        </div>
      </div>
    </div>
  </main>

  <script src="/my-wine-cabinet/js/datastore.js"></script>
  <script src="/my-wine-cabinet/js/app.js"></script>
  <script src="/my-wine-cabinet/js/ui.js"></script>
  <script src="/my-wine-cabinet/js/onboarding.js?v=20260702f"></script>
  <script>
    (function() {
      var finishedExpanded = false;

      var state = {
        searchQuery: '',
        selectedBrand: 'all',
        selectedType: 'all',
        sortBy: 'date'
      };

      function getAllWines() {
        var data = WineCabinetApp.getData();
        return data.wines || [];
      }

      function getActiveWines() {
        return getAllWines().filter(function(w) { return w.status !== 'finished'; });
      }

      function getFinishedWines() {
        return getAllWines().filter(function(w) { return w.status === 'finished'; });
      }

      function getUniqueBrands() {
        var brands = {};
        getActiveWines().forEach(function(w) {
          if (w.brand) brands[w.brand] = true;
        });
        return Object.keys(brands).sort();
      }

      function getUniqueTypes() {
        var types = {};
        getActiveWines().forEach(function(w) {
          var t = w.detailType || w.subCategory || w.type || '';
          if (t) types[t] = true;
        });
        return Object.keys(types).sort();
      }

      function getStatusBadge(status, remaining, capacity) {
        var map = {
          'cellared': { text: '在藏', cls: 'badge-success' },
          'opened': { text: '已开', cls: 'badge-primary' },
          'finished': { text: '已饮', cls: '' }
        };
        var info = map[status] || map['cellared'];
        var extra = '';
        if (status === 'opened' && remaining != null) {
          extra = ' · 剩' + remaining + 'mL';
        }
        var badgeStyle = '';
        if (status === 'finished') {
          badgeStyle = 'background: rgba(156, 139, 122, 0.15); color: var(--color-text-tertiary);';
        }
        return '<span class="badge badge-pill ' + info.cls + '"' + (badgeStyle ? ' style="' + badgeStyle + '"' : '') + '>' + info.text + extra + '</span>';
      }

      function getTypeColor(type) {
        var typeColors = {
          '白酒': '#8B6914', '红酒': '#A63D2F', '葡萄酒': '#A63D2F', '啤酒': '#C17817',
          '洋酒': '#4A6B8A', '威士忌': '#4A6B8A', '白兰地': '#6B4226', '清酒': '#3D7A4A',
          '果酒': '#B44D6B', '黄酒': '#8B6914', '米酒': '#6B4226',
          '浓香': '#8B6914', '酱香': '#A63D2F', '清香': '#4A6B8A', '凤香': '#3D7A4A',
          '酱香型': '#A63D2F', '浓香型': '#8B6914', '清香型': '#4A6B8A', '兼香型': '#6B4226',
          '米香型': '#3D7A4A', '凤香型': '#3D7A4A', '豉香型': '#B44D6B', '芝麻香型': '#8B6914',
          '特香型': '#4A6B8A', '药香型': '#6B4226', '老白干香型': '#8B6914', '馥郁香型': '#A63D2F',
          '单一麦芽': '#4A6B8A', '单一谷物': '#4A6B8A', '调和威士忌': '#4A6B8A', '调和麦芽': '#4A6B8A',
          '波本': '#8B6914', '黑麦威士忌': '#4A6B8A', '田纳西威士忌': '#4A6B8A', '日本威士忌': '#A63D2F',
          '干邑': '#6B4226', '雅文邑': '#6B4226', '伏特加': '#4682B4', '朗姆酒': '#C17817',
          '金酒': '#3D7A4A', '龙舌兰': '#B44D6B',
          '拉格': '#C17817', '艾尔': '#C17817', 'IPA': '#DAA520', '世涛': '#3C3C3C',
          '小麦啤': '#E8C547', '波特': '#6B4226', '酸啤': '#B44D6B',
          '红葡萄酒': '#A63D2F', '白葡萄酒': '#E8C547', '桃红葡萄酒': '#E8A0BF',
          '起泡葡萄酒': '#DAA520', '冰酒': '#E8C547', '餐酒': '#A63D2F',
          '利口酒': '#B44D6B', '鸡尾酒': '#4A6B8A'
        };
        return typeColors[type] || 'var(--color-primary)';
      }

      function renderWineCard(wine) {
        var isGrouped = wine.wines && wine.wines.length > 0;
        var representativeWine = isGrouped ? wine.wines[0] : wine;
        var pinnedClass = (wine.pinned || representativeWine.pinned) ? ' pinned' : '';
        var totalQuantity = isGrouped ? wine.totalQuantity : (representativeWine.quantity || 1);
        var totalPrice = isGrouped ? wine.totalPrice : ((representativeWine.price || 0) * (representativeWine.quantity || 1));
        var statusBadge = getStatusBadge(representativeWine.status, representativeWine.remaining, representativeWine.capacity);
        var typeColor = getTypeColor(representativeWine.type);
        var scoreHtml = '';
        if (representativeWine.tastingScore) {
          scoreHtml = '<span style="display: inline-flex; align-items: center; gap: 3px; font-size: var(--text-xs); color: var(--state-warning); font-weight: var(--font-medium);">' +
            '<i data-lucide="star" style="width: 12px; height: 12px; fill: var(--state-warning); stroke: var(--state-warning);"></i>' +
            representativeWine.tastingScore +
          '</span>';
        }

        var imageHtml = '';
        var displayImage = wine.image || representativeWine.image;
        if (displayImage) {
          imageHtml = '<div class="wine-bottle-icon" style="overflow: hidden;">' +
            '<img src="' + displayImage + '" style="width: 100%; height: 100%; object-fit: cover;" alt="' + WineCabinetApp.escapeHtml(wine.name || representativeWine.name) + '">' +
          '</div>';
        } else {
          imageHtml = '<div class="wine-bottle-icon">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M8 22h8a1 1 0 0 0 1-1v-6.34a3 3 0 0 0-.76-2L15 11V6a1 1 0 0 0-1-1h-1V3h-2v2h-1a1 1 0 0 0-1 1v5l-1.24 1.66a3 3 0 0 0-.76 2V21a1 1 0 0 0 1 1z"/>' +
              '<line x1="10" y1="9" x2="14" y2="9"/>' +
            '</svg>' +
          '</div>';
        }

        var detailType = wine.detailType || representativeWine.detailType || wine.subCategory || representativeWine.subCategory || wine.type || representativeWine.type || '';

        return '<a href="/my-wine-cabinet/pages/detail.html?id=' + representativeWine.id + '" class="wine-card' + pinnedClass + '">' +
          '<div style="display: flex; gap: 12px;">' +
            imageHtml +
            '<div style="flex: 1; min-width: 0;">' +
              '<div style="display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px;">' +
                '<div style="min-width: 0; flex: 1;">' +
                  '<div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">' +
                    '<h3 style="font-family: var(--font-display); font-size: var(--text-lg); font-weight: var(--font-semibold); color: var(--color-text-primary); margin: 0; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">' + WineCabinetApp.escapeHtml(wine.name || representativeWine.name) + '</h3>' +
                    '<span style="display: inline-flex; align-items: center; justify-content: center; height: 18px; padding: 0 6px; border-radius: var(--radius-sm); font-size: 10px; font-weight: var(--font-semibold); background: ' + typeColor + '15; color: ' + typeColor + '; flex-shrink: 0;">' + WineCabinetApp.escapeHtml(detailType) + '</span>' +
                  '</div>' +
                  '<p style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">' + WineCabinetApp.escapeHtml(wine.brand || representativeWine.brand) + '</p>' +
                '</div>' +
                '<div style="text-align: right; flex-shrink: 0;">' +
                  '<div style="font-family: var(--font-display); font-size: var(--text-lg); font-weight: var(--font-bold); color: var(--color-primary); line-height: 1.2;">' + WineCabinetApp.formatCurrency(totalPrice) + '</div>' +
                  '<div style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: 2px;">×' + totalQuantity + '瓶</div>' +
                '</div>' +
              '</div>' +
              '<div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 8px;">' +
                '<span class="badge">' + (representativeWine.degree || '') + '°</span>' +
                (isGrouped ? '<span class="badge">' + wine.totalCapacity + 'mL</span>' : '<span class="badge">' + (representativeWine.capacity || '') + 'mL</span>') +
                statusBadge +
                scoreHtml +
                (isGrouped ? '<span style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin-left: auto;">' + (representativeWine.tastingScore ? ' · ' : '') + wine.wines.length + '个规格</span>' : '') +
              '</div>' +
            '</div>' +
          '</div>' +
        '</a>';
      }

      function renderFinishedCard(wine) {
        var totalQuantity = wine.quantity || 1;
        var typeColor = getTypeColor(wine.type);
        var qtyHtml = totalQuantity > 1 ? '<span class="badge" style="font-size: 10px;">×' + totalQuantity + '瓶</span>' : '';
        return '<a href="/my-wine-cabinet/pages/detail.html?id=' + wine.id + '" class="wine-card" style="opacity: 0.7;">' +
          '<div style="display: flex; gap: 12px;">' +
            '<div class="wine-bottle-icon" style="background: var(--color-background-sunken);">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;">' +
                '<path d="M8 22h8a1 1 0 0 0 1-1v-6.34a3 3 0 0 0-.76-2L15 11V6a1 1 0 0 0-1-1h-1V3h-2v2h-1a1 1 0 0 0-1 1v5l-1.24 1.66a3 3 0 0 0-.76 2V21a1 1 0 0 0 1 1z"/>' +
                '<line x1="10" y1="9" x2="14" y2="9"/>' +
              '</svg>' +
            '</div>' +
            '<div style="flex: 1; min-width: 0;">' +
              '<div style="display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;">' +
                '<div style="min-width: 0; flex: 1;">' +
                  '<div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">' +
                    '<h3 style="font-size: var(--text-base); font-weight: var(--font-medium); color: var(--color-text-secondary); margin: 0; line-height: 1.3; text-decoration: line-through; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">' + WineCabinetApp.escapeHtml(wine.name) + '</h3>' +
                    '<span style="display: inline-flex; align-items: center; justify-content: center; height: 18px; padding: 0 6px; border-radius: var(--radius-sm); font-size: 10px; font-weight: var(--font-semibold); background: ' + typeColor + '15; color: ' + typeColor + '; flex-shrink: 0; opacity: 0.6;">' + WineCabinetApp.escapeHtml(wine.detailType || wine.subCategory || wine.type || '') + '</span>' +
                  '</div>' +
                  '<p style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin: 2px 0 0;">' + WineCabinetApp.escapeHtml(wine.brand) + ' · ' + (wine.degree || '') + '° · ' + (wine.capacity || '') + 'mL' + (wine.spec ? ' · ' + WineCabinetApp.escapeHtml(wine.spec) : '') + '</p>' +
                '</div>' +
                '<div style="text-align: right; flex-shrink: 0;">' +
                  getStatusBadge('finished') +
                  (wine.finishDate ? '<p style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin: 4px 0 0;">' + wine.finishDate + '</p>' : '') +
                '</div>' +
              '</div>' +
              (qtyHtml ? '<div style="display: flex; gap: 6px; margin-top: 6px;">' + qtyHtml + '</div>' : '') +
            '</div>' +
          '</div>' +
        '</a>';
      }

      function groupWinesByBrandAndName(wines) {
        var groups = {};
        wines.forEach(function(w) {
          var key = (w.brand || '').trim().toLowerCase() + '|' + (w.name || '').trim().toLowerCase();
          if (!groups[key]) {
            groups[key] = {
              brand: w.brand,
              name: w.name,
              wines: [],
              totalQuantity: 0,
              totalPrice: 0,
              totalCapacity: 0,
              type: w.type,
              category: w.category,
              subCategory: w.subCategory,
              detailType: w.detailType,
              image: w.image,
              pinned: w.pinned
            };
          }
          groups[key].wines.push(w);
          groups[key].totalQuantity += (w.quantity || 1);
          groups[key].totalPrice += ((w.price || 0) * (w.quantity || 1));
          groups[key].totalCapacity += (w.capacity || 0) * (w.quantity || 1);
        });
        return Object.values(groups);
      }

      function filterAndSortWines() {
        var active = getActiveWines();
        var filtered = active.filter(function(w) {
          if (state.selectedBrand !== 'all' && w.brand !== state.selectedBrand) return false;

          if (state.selectedType !== 'all') {
            var wineType = w.detailType || w.subCategory || w.type || '';
            if (wineType !== state.selectedType) return false;
          }

          if (state.searchQuery) {
            var q = state.searchQuery.toLowerCase();
            var nameMatch = w.name && w.name.toLowerCase().indexOf(q) !== -1;
            var brandMatch = w.brand && w.brand.toLowerCase().indexOf(q) !== -1;
            var codeMatch = w.code && w.code.toLowerCase().indexOf(q) !== -1;
            if (!nameMatch && !brandMatch && !codeMatch) return false;
          }

          return true;
        });

        filtered.sort(function(a, b) {
          if (a.pinned && !b.pinned) return -1;
          if (!a.pinned && b.pinned) return 1;

          switch (state.sortBy) {
            case 'price':
              return (b.price || 0) - (a.price || 0);
            case 'degree':
              return (b.degree || 0) - (a.degree || 0);
            case 'name':
              return (a.name || '').localeCompare(b.name || '', 'zh-CN');
            case 'date':
            default:
              return new Date(b.purchaseDate || b.createdAt || 0) - new Date(a.purchaseDate || a.createdAt || 0);
          }
        });

        return filtered;
      }

      function renderBrandFilters() {
        var container = document.getElementById('brand-filters');
        var brands = getUniqueBrands();

        var html = '<button class="filter-chip' + (state.selectedBrand === 'all' ? ' active' : '') + '" data-brand="all">全部品牌</button>';
        brands.forEach(function(brand) {
          var shortName = brand.length > 6 ? brand.substring(0, 6) + '…' : brand;
          var isActive = state.selectedBrand === brand ? ' active' : '';
          html += '<button class="filter-chip' + isActive + '" data-brand="' + brand + '">' + shortName + '</button>';
        });

        container.innerHTML = html;

        container.querySelectorAll('button').forEach(function(btn) {
          btn.addEventListener('click', function() {
            state.selectedBrand = this.getAttribute('data-brand');
            container.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            renderWineList();
          });
        });
      }

      function renderTypeFilters() {
        var container = document.getElementById('type-filters');
        var types = getUniqueTypes();

        var html = '<button class="filter-chip small' + (state.selectedType === 'all' ? ' active' : '') + '" data-type="all">全部类型</button>';
        types.forEach(function(type) {
          var isActive = state.selectedType === type ? ' active' : '';
          html += '<button class="filter-chip small' + isActive + '" data-type="' + type + '">' + type + '</button>';
        });

        container.innerHTML = html;

        container.querySelectorAll('button').forEach(function(btn) {
          btn.addEventListener('click', function() {
            state.selectedType = this.getAttribute('data-type');
            container.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            renderWineList();
          });
        });
      }

      function renderSortButtons() {
        var container = document.getElementById('sort-buttons');
        container.querySelectorAll('button').forEach(function(btn) {
          btn.addEventListener('click', function() {
            state.sortBy = this.getAttribute('data-sort');
            container.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            renderWineList();
          });
        });
      }

      function toggleFinished() {
        finishedExpanded = !finishedExpanded;
        var list = document.getElementById('finished-list');
        var chevron = document.getElementById('finished-chevron');
        if (finishedExpanded) {
          list.style.display = 'flex';
          if (chevron) chevron.style.transform = 'rotate(90deg)';
        } else {
          list.style.display = 'none';
          if (chevron) chevron.style.transform = '';
        }
      }

      function renderWineList() {
        var container = document.getElementById('wine-list');
        var countBadge = document.getElementById('wine-count-badge');
        var finishedSection = document.getElementById('finished-section');
        var finishedCountBadge = document.getElementById('finished-count-badge');
        var finishedList = document.getElementById('finished-list');
        var finishedToggle = document.getElementById('finished-toggle');

        var filtered = filterAndSortWines();
        var finished = getFinishedWines();
        var totalQty = filtered.reduce(function(sum, w) { return sum + (w.quantity || 1); }, 0);

        countBadge.textContent = totalQty + ' 瓶';

        if (filtered.length === 0) {
          var hasAnyWines = getActiveWines().length > 0;
          if (hasAnyWines) {
            container.innerHTML = '<div class="empty-state" style="padding: 32px 24px;">' +
              '<svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                '<circle cx="11" cy="11" r="8"/>' +
                '<path d="m21 21-4.3-4.3"/>' +
              '</svg>' +
              '<p class="empty-state-title">未找到酒品</p>' +
              '<p class="empty-state-desc">试试点击"全部品牌"或"全部类型"重置筛选</p>' +
            '</div>';
          } else {
            container.innerHTML = WineCabinetApp.createEmptyState({
              icon: 'wine',
              title: '您的酒柜还是空的',
              message: '点击右上角 + 按钮，或用AI拍照快速添加您的第一瓶酒',
              actionText: '📷 AI拍照加酒',
              actionLink: 'add-wine.html'
            });
          }
        } else {
          var grouped = groupWinesByBrandAndName(filtered);
          container.innerHTML = grouped.map(renderWineCard).join('');
        }

        var finishedQty = finished.reduce(function(sum, w) { return sum + (w.quantity || 1); }, 0);
        finishedCountBadge.textContent = finishedQty + ' 瓶';

        if (finished.length === 0) {
          finishedSection.style.display = 'none';
        } else {
          finishedSection.style.display = '';
          finishedList.innerHTML = finished.map(renderFinishedCard).join('');
          finishedList.style.display = finishedExpanded ? 'flex' : 'none';
          var chevron = document.getElementById('finished-chevron');
          if (chevron) chevron.style.transform = finishedExpanded ? 'rotate(90deg)' : '';
          if (finishedToggle) {
            finishedToggle.onclick = toggleFinished;
          }
        }

        if (window.lucide) {
          lucide.createIcons();
        }
      }

      function initSearch() {
        var input = document.getElementById('search-input');
        var timer = null;
        input.addEventListener('input', function() {
          if (timer) clearTimeout(timer);
          timer = setTimeout(function() {
            state.searchQuery = input.value.trim();
            renderWineList();
          }, 150);
        });
      }

      function init() {
        renderBrandFilters();
        renderTypeFilters();
        renderSortButtons();
        initSearch();
        renderWineList();
        if (window.lucide) {
          lucide.createIcons();
        }
        if (WineCabinetApp.onDataUpdated) {
          WineCabinetApp.onDataUpdated(function() {
            renderBrandFilters();
            renderTypeFilters();
            renderWineList();
          });
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
