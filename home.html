<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页-我的酒柜</title>
    <link rel="stylesheet" href="./css/global.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="page-container">
<div class="status-bar-placeholder"></div>

<div id="main-content" style="min-height: calc(100vh - 44px - 80px); padding-bottom: 80px;">
  <div style="padding: 0 16px;">

    <!-- ===== Header: Welcome ===== -->
    <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0 16px;">
      <div>
        <h1 style="font-family: var(--font-display); font-size: var(--text-3xl); font-weight: var(--font-semibold); line-height: var(--leading-tight); color: var(--color-text-primary); margin: 0; word-break: keep-all; text-wrap: balance;">我的酒柜</h1>
      </div>
      <div style="width: 36px; height: 36px; border-radius: var(--radius-full); background: var(--color-primary-lightest); display: flex; align-items: center; justify-content: center;">
        <i data-lucide="user" style="width: 20px; height: 20px; color: var(--color-primary);"></i>
      </div>
    </div>

    <!-- ===== Hero Banner ===== -->
    <div id="hero-banner" style="position: relative; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 24px;">
      <img src="./assets/hero-cabinet.jpg" alt="酒柜藏品展示" style="width: 100%; height: 160px; object-fit: cover; display: block;">
      <div style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(44, 24, 16, 0.7) 0%, rgba(44, 24, 16, 0.1) 100%); border-radius: var(--radius-lg);"></div>
      <div style="position: absolute; bottom: 0; left: 0; right: 0; padding: 16px;">
        <p id="hero-text" style="font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text-inverse); margin: 0; font-weight: var(--font-medium);">藏品 28 瓶 &nbsp;|&nbsp; 本月新增 3 瓶</p>
      </div>
    </div>

    <!-- ===== Stats Grid (2x2) ===== -->
    <div id="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px;">
    </div>

    <!-- ===== Quick Actions ===== -->
    <div style="display: flex; justify-content: space-around; margin-bottom: 32px; padding: 0 8px;">
      <a href="add-wine.html" style="display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; flex: 1;">
        <div style="width: 52px; height: 52px; border-radius: var(--radius-full); background: linear-gradient(135deg, var(--color-primary), #DAA520); display: flex; align-items: center; justify-content: center; transition: transform 160ms cubic-bezier(.2,.8,.2,1), box-shadow 160ms cubic-bezier(.2,.8,.2,1); box-shadow: 0 4px 12px rgba(139,105,20,0.3);" onmouseenter="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 16px rgba(139,105,20,0.4)'" onmouseleave="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 12px rgba(139,105,20,0.3)'">
          <i data-lucide="camera" style="width: 24px; height: 24px; color: var(--color-text-inverse);"></i>
        </div>
        <span style="font-family: var(--font-body); font-size: var(--text-xs); color: var(--color-text-primary); font-weight: 500; text-align: center;">AI拍照加酒</span>
      </a>
      <a href="collection.html" style="display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; flex: 1;">
        <div style="width: 52px; height: 52px; border-radius: var(--radius-full); border: 1px solid var(--color-border); background: var(--color-background-elevated); display: flex; align-items: center; justify-content: center; transition: transform 160ms cubic-bezier(.2,.8,.2,1), border-color 160ms cubic-bezier(.2,.8,.2,1);" onmouseenter="this.style.transform='translateY(-2px)';this.style.borderColor='var(--color-primary-light)'" onmouseleave="this.style.transform='translateY(0)';this.style.borderColor='var(--color-border)'">
          <i data-lucide="wine" style="width: 24px; height: 24px; color: var(--color-primary);"></i>
        </div>
        <span style="font-family: var(--font-body); font-size: var(--text-xs); color: var(--color-text-secondary); text-align: center;">我的酒柜</span>
      </a>
      <a href="#" id="export-btn" style="display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; flex: 1;">
        <div style="width: 52px; height: 52px; border-radius: var(--radius-full); border: 1px solid var(--color-border); background: var(--color-background-elevated); display: flex; align-items: center; justify-content: center; transition: transform 160ms cubic-bezier(.2,.8,.2,1), border-color 160ms cubic-bezier(.2,.8,.2,1);" onmouseenter="this.style.transform='translateY(-2px)';this.style.borderColor='var(--color-primary-light)'" onmouseleave="this.style.transform='translateY(0)';this.style.borderColor='var(--color-border)'">
          <i data-lucide="download" style="width: 24px; height: 24px; color: var(--color-primary);"></i>
        </div>
        <span style="font-family: var(--font-body); font-size: var(--text-xs); color: var(--color-text-secondary); text-align: center;">备份数据</span>
      </a>
    </div>

    <!-- ===== Recent Activity ===== -->
    <div style="margin-bottom: 32px;">
      <h2 style="font-family: var(--font-display); font-size: var(--text-xl); font-weight: var(--font-semibold); color: var(--color-text-primary); margin: 0 0 16px; word-break: keep-all;">最近动态</h2>
      <div id="recent-activity" style="display: flex; flex-direction: column; gap: 0;">
      </div>
    </div>

    <!-- ===== Expiry Alert (临期提醒) ===== -->
    <section id="expiry-section" style="padding-top: 4px; padding-bottom: 4px;">
      <h2 style="font-family: var(--font-display); font-size: var(--text-xl); font-weight: var(--font-semibold); color: var(--color-text-primary); margin: 0 0 16px; line-height: var(--leading-tight); word-break: keep-all; display: flex; align-items: center; gap: 8px;">
        临期提醒
        <span id="expiry-count" style="display: inline-flex; align-items: center; justify-content: center; height: 18px; padding: 0 6px; border-radius: var(--radius-full); background: rgba(166, 61, 47, 0.1); color: var(--state-error); font-size: var(--text-xs); font-weight: var(--font-semibold);">2</span>
      </h2>
      <div id="expiry-list" style="display: flex; flex-direction: column; gap: 10px;">
      </div>
    </section>

    <!-- ===== Top Rated (品鉴排行) ===== -->
    <div style="margin-bottom: 24px;">
      <h2 style="font-family: var(--font-display); font-size: var(--text-xl); font-weight: var(--font-semibold); color: var(--color-text-primary); margin: 0 0 16px; word-break: keep-all;">品鉴排行</h2>
      <div id="top-rated" style="display: flex; flex-direction: column; gap: 12px;">
      </div>
    </div>

  </div>
</div>

    </main>
    <script src="./js/datastore.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/onboarding.js?v=20260702f"></script>
    <script>
      (function() {
        var data = WineCabinetApp.getData();
        var stats = WineCabinetApp.getStats();

        function formatCurrency(value) {
          return '¥' + value.toLocaleString('zh-CN');
        }

        function formatNumber(value) {
          return value.toLocaleString('zh-CN');
        }

        function renderStats() {
          var statsGrid = document.getElementById('stats-grid');
          var statsItems = [
            { icon: 'archive', label: '在库数', value: formatNumber(stats.totalCount), unit: '瓶', size: 'xl' },
            { icon: 'coins', label: '总价值', value: formatCurrency(stats.totalValue), unit: '', size: 'md' },
            { icon: 'beaker', label: '总容量', value: formatNumber(stats.totalCapacity), unit: 'mL', size: 'xl' },
            { icon: 'check-circle', label: '已喝完', value: formatNumber(stats.finishedCount), unit: '瓶', size: 'xl' }
          ];

          statsGrid.innerHTML = statsItems.map(function(item) {
            var valueSize = item.size === 'md' ? 'var(--text-2xl)' : 'var(--text-4xl)';
            return '<div style="background: var(--color-background-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px;">' +
              '<div style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px;">' +
                '<i data-lucide="' + item.icon + '" style="width: 16px; height: 16px; color: var(--color-primary);"></i>' +
                '<span style="font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-secondary);">' + item.label + '</span>' +
              '</div>' +
              '<span style="font-family: var(--font-body); font-size: ' + valueSize + '; font-weight: var(--font-bold); color: var(--color-text-primary); line-height: 1; font-variant-numeric: tabular-nums;">' + item.value + '</span>' +
              (item.unit ? '<span style="font-family: var(--font-body); font-size: var(--text-xs); color: var(--color-text-tertiary); margin-left: 2px;">' + item.unit + '</span>' : '') +
            '</div>';
          }).join('');
        }

        function renderHeroBanner() {
          var heroText = document.getElementById('hero-text');
          var totalCount = stats.totalCount;
          heroText.textContent = '藏品 ' + totalCount + ' 瓶';
        }

        function renderRecentActivity() {
          var container = document.getElementById('recent-activity');
          var activities = data.activities || [];

          if (activities.length === 0) {
            container.innerHTML = WineCabinetApp.createEmptyState({
              icon: 'clock',
              title: '还没有动态',
              message: '添加酒后，这里会显示您的藏酒动态',
              actionText: '立即添加',
              actionLink: 'add-wine.html'
            });
            return;
          }

          var iconMap = {
            'open': { icon: 'wine', bg: 'var(--color-primary-lightest)', color: 'var(--color-primary)' },
            'add': { icon: 'package-plus', bg: 'var(--color-background-muted)', color: 'var(--color-text-secondary)' },
            'tasting': { icon: 'star', bg: 'var(--color-background-muted)', color: 'var(--color-text-secondary)' },
            'finish': { icon: 'check-circle', bg: 'var(--color-background-muted)', color: 'var(--state-success)' }
          };

          var typeTextMap = {
            'open': '开瓶',
            'add': '入库',
            'tasting': '品鉴',
            'finish': '已饮'
          };

          container.innerHTML = activities.map(function(activity, index) {
            var style = iconMap[activity.type] || iconMap['add'];
            var isLast = index === activities.length - 1;
            var borderStyle = isLast ? '' : 'border-bottom: 1px solid var(--color-border-light);';
            var description = typeTextMap[activity.type] + ' &middot; ' + WineCabinetApp.escapeHtml(activity.wine) + (activity.spec ? '<span style="font-size:12px;background:rgba(139,105,20,0.1);color:var(--color-primary);padding:2px 7px;border-radius:4px;margin-left:6px;font-weight:var(--font-medium);">' + WineCabinetApp.escapeHtml(activity.spec) + '</span>' : '');
            if (activity.type === 'tasting' && activity.score) {
              description += ' &mdash; 评分 ' + activity.score;
            }
            return '<div style="display: flex; align-items: flex-start; gap: 12px; padding: 12px 0;' + borderStyle + '">' +
              '<div style="width: 32px; height: 32px; border-radius: var(--radius-full); background: ' + style.bg + '; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;">' +
                '<i data-lucide="' + style.icon + '" style="width: 16px; height: 16px; color: ' + style.color + ';"></i>' +
              '</div>' +
              '<div style="flex: 1; min-width: 0;">' +
                '<p style="font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text-primary); margin: 0; line-height: 1.4;">' + description + '</p>' +
              '</div>' +
              '<span style="font-family: var(--font-body); font-size: var(--text-xs); color: var(--color-text-tertiary); white-space: nowrap; flex-shrink: 0;">' + activity.date + '</span>' +
            '</div>';
          }).join('');
        }

        function renderExpiryAlerts() {
          var container = document.getElementById('expiry-list');
          var countBadge = document.getElementById('expiry-count');
          var alerts = stats.expiryAlerts || [];

          countBadge.textContent = alerts.length;

          if (alerts.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:24px 0;color:var(--color-text-tertiary);font-size:var(--text-sm);"><i data-lucide="check-circle" style="width:32px;height:32px;color:var(--state-success);margin-bottom:8px;display:block;margin-left:auto;margin-right:auto;"></i>没有临期提醒，状态很好！</div>';
            if (window.lucide) lucide.createIcons();
            return;
          }

          container.innerHTML = alerts.map(function(alert) {
            var borderColor = alert.urgent ? 'rgba(166, 61, 47, 0.2)' : 'rgba(184, 134, 11, 0.2)';
            var leftBorderColor = alert.urgent ? 'var(--state-error)' : 'var(--state-warning)';
            var dayColor = alert.urgent ? 'var(--state-error)' : 'var(--state-warning)';
            var dayText = alert.isExpired ? '⚠️ 已过期 ' + Math.abs(alert.daysLeft) + ' 天' : '还剩 ' + alert.daysLeft + ' 天';
            return '<a href="detail.html?id=' + alert.id + '" style="text-decoration:none;color:inherit;display:block;">' +
              '<div style="background: var(--color-background-elevated); border-radius: var(--radius-md); border: 1px solid ' + borderColor + '; border-left: 3px solid ' + leftBorderColor + '; padding: 12px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;" onmouseenter="this.style.transform=\'translateY(-1px)\';this.style.boxShadow=\'0 2px 8px rgba(0,0,0,0.08)\'" onmouseleave="this.style.transform=\'\';this.style.boxShadow=\'\'">' +
                '<div style="display: flex; align-items: center; justify-content: space-between;">' +
                  '<div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">' +
                    '<span style="font-size: var(--text-sm); font-weight: var(--font-semibold); color: var(--color-text-primary); white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + WineCabinetApp.escapeHtml(alert.name) + '</span>' +
                    (alert.spec ? '<span style="font-size:11px;background:var(--color-primary-light);color:var(--color-primary);padding:1px 5px;border-radius:3px;flex-shrink:0;">' + WineCabinetApp.escapeHtml(alert.spec) + '</span>' : '') +
                  '</div>' +
                  '<span style="font-size: var(--text-xs); color: ' + dayColor + '; font-weight: var(--font-semibold); flex-shrink:0; margin-left:8px;">' + dayText + '</span>' +
                  '<i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--color-text-tertiary);flex-shrink:0;margin-left:4px;"></i>' +
                '</div>' +
                '<div style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: 4px;">保质期/适饮期至 ' + alert.expiryDate + '</div>' +
              '</div>' +
            '</a>';
          }).join('');
        }

        function renderTopRated() {
          var container = document.getElementById('top-rated');
          var wines = data.wines || [];

          var ratedWines = wines.filter(function(w) {
            return w.tastingScore && w.tastingScore > 0;
          }).sort(function(a, b) {
            return b.tastingScore - a.tastingScore;
          }).slice(0, 3);

          if (ratedWines.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:24px 0;color:var(--color-text-tertiary);font-size:var(--text-sm);"><i data-lucide="star" style="width:32px;height:32px;color:var(--color-primary-lighter);margin-bottom:8px;display:block;margin-left:auto;margin-right:auto;"></i>暂无品鉴记录</div>';
            if (window.lucide) lucide.createIcons();
            return;
          }

          container.innerHTML = ratedWines.map(function(wine, index) {
            var rank = index + 1;
            var rankColor = rank === 1 ? 'var(--color-primary)' : 'var(--color-text-secondary)';
            var badgeBg = rank === 1 ? 'var(--color-primary)' : 'var(--color-primary-light)';
            return '<a href="detail.html?id=' + wine.id + '" style="text-decoration: none; color: inherit; display: block;">' +
              '<div style="display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--color-background-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-md);">' +
                '<span style="font-family: var(--font-body); font-size: var(--text-lg); font-weight: var(--font-bold); color: ' + rankColor + '; width: 24px; text-align: center; flex-shrink: 0;">' + rank + '</span>' +
                '<div style="flex: 1; min-width: 0;">' +
                  '<p style="font-family: var(--font-body); font-size: var(--text-base); font-weight: var(--font-medium); color: var(--color-text-primary); margin: 0;">' + WineCabinetApp.escapeHtml(wine.name) + (wine.spec ? '<span style="font-size:11px;background:var(--color-primary-light);color:var(--color-primary);padding:1px 5px;border-radius:3px;margin-left:6px;">' + WineCabinetApp.escapeHtml(wine.spec) + '</span>' : '') + '</p>' +
                  '<p style="font-family: var(--font-body); font-size: var(--text-xs); color: var(--color-text-tertiary); margin: 2px 0 0;">' + wine.degree + '度 &middot; ' + wine.capacity + 'ml</p>' +
                '</div>' +
                '<div style="background: ' + badgeBg + '; border-radius: var(--radius-sm); padding: 4px 8px; flex-shrink: 0;">' +
                  '<span style="font-family: var(--font-body); font-size: var(--text-sm); font-weight: var(--font-bold); color: var(--color-text-inverse); font-variant-numeric: tabular-nums;">' + wine.tastingScore + '</span>' +
                '</div>' +
              '</div>' +
            '</a>';
          }).join('');
        }

        function init() {
          renderStats();
          renderHeroBanner();
          renderRecentActivity();
          renderExpiryAlerts();
          renderTopRated();

          document.getElementById('export-btn').addEventListener('click', function(e) {
            e.preventDefault();
            var exportData = WineCabinetApp.getData();
            var jsonStr = JSON.stringify(exportData, null, 2);
            var blob = new Blob([jsonStr], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'wine-cabinet-backup-' + new Date().toISOString().slice(0, 10) + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            WineCabinetApp.showToast('数据导出成功', 'success');
          });

          if (window.lucide) {
            lucide.createIcons();
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }
      })();
    </script>
</body>
</html>
